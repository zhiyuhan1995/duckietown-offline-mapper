input:
  path: track.mp4
  keyframe_interval: 180
  max_keyframes: 3

reconstruction:
  backend: vggt_sfm
  vggt:
    device: cuda
    dtype: auto
    confidence_threshold: 5.0
    max_points: 250000
    sample_stride: 2
    save_depth: false
  sfm:
    save_colmap: true
    bundle_adjustment: false

roi:
  auto: true

bev:
  resolution: 0.02

export:
  output_dir: outputs/track_map_vggt_colmap_smoke
  map_frame: map

