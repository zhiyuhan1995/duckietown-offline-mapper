input:
  path: track.mp4
  keyframe_interval: 60
  max_keyframes: 24

reconstruction:
  backend: vggt_sfm
  vggt:
    model_id: facebook/VGGT-1B
    checkpoint_url: null
    device: cuda
    dtype: auto
    preprocess_mode: crop
    use_point_map: false
    confidence_threshold: 4.0
    relax_ground_confidence: true
    ground_confidence_threshold: 1.0
    max_points: 900000
    sample_stride: 1
    seed: 7
    save_depth: false
  sfm:
    save_colmap: false
    bundle_adjustment: false

ground_plane:
  distance_threshold: 0.025
  max_iterations: 1200

alignment:
  mode: sim2
  control_points: []

roi:
  auto: true
  percentile_low: 0.25
  percentile_high: 99.75
  padding: 0.2
  x_min: 0.0
  x_max: 5.0
  y_min: -1.0
  y_max: 1.0

bev:
  resolution: 0.02
  unknown_rgb: [80, 80, 80]

segmentation:
  road_v_max: 105
  road_s_max: 125
  white_v_min: 145
  white_s_max: 90
  yellow_h_min: 15
  yellow_h_max: 40
  yellow_s_min: 55
  yellow_v_min: 75
  red_s_min: 65
  red_v_min: 65
  morphology_open: 1
  morphology_close: 4

occupancy:
  non_ground_height_threshold: 0.06
  robot_radius: 0.085
  safety_margin: 0.025
  unknown_as_occupied: false

export:
  output_dir: outputs/track_map_edge_complete
  map_frame: map

