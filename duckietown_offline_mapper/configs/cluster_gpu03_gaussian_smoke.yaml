input:
  path: track.mp4
  keyframe_interval: 180
  max_keyframes: 3

reconstruction:
  backend: vggt_sfm
  vggt:
    device: cuda
    dtype: auto
    confidence_threshold: 5.0
    relax_ground_confidence: true
    ground_confidence_threshold: 1.2
    max_points: 250000
    sample_stride: 2
    save_depth: false
  sfm:
    save_colmap: true
    bundle_adjustment: false

roi:
  auto: true

bev:
  resolution: 0.02

gaussian:
  enabled: true
  use_for_bev: true
  python: .venv-gsplat/bin/python
  trainer_script: external/gsplat-v1.3.0/examples/simple_trainer.py
  examples_dir: external/gsplat-v1.3.0/examples
  render_script: duckietown_offline_mapper/tools/render_gaussian_bev.py
  cuda_visible_devices: 0
  render_device: cuda:0
  data_factor: 1
  max_steps: 120
  save_steps: 120
  eval_steps: 999999
  tb_every: 20
  render_sh_degree: 0
  alpha_observed_threshold: 5

export:
  output_dir: outputs/track_map_gaussian_smoke
  map_frame: map
